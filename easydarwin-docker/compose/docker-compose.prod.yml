version: '3.8'

services:
  easydarwin:
    image: cakeor/easydarwin:v8.3.3
    container_name: easydarwin-prod
    restart: always
    ports:
      - "8080:8080"
      - "554:554"
      - "1935:1935"
      - "4433:4433"
      - "5544:5544"
      - "8083:8083"
      - "8084:8084"
      - "1290:1290"
      - "30000-30100:30000-30100/udp"
      - "6001:6001/udp"
      - "4888:4888/udp"
    volumes:
      - easydarwin-configs:/app/configs
      - easydarwin-logs:/app/logs
      - easydarwin-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=warn
      - ENVIRONMENT=production
    networks:
      - easydarwin-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/getserverinfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: easydarwin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - easydarwin
    networks:
      - easydarwin-network

networks:
  easydarwin-network:
    driver: bridge

volumes:
  easydarwin-configs:
  easydarwin-logs:
  easydarwin-data:
  nginx-logs: