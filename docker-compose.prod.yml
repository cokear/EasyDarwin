version: '3.8'

services:
  easydarwin:
    image: cakeor/easydarwin:v8.3.3
    container_name: easydarwin-prod
    restart: always
    ports:
      # Web管理界面 - 建议使用反向代理
      - "8080:8080"
      # RTSP端口
      - "554:554"
      # RTMP端口
      - "1935:1935"
      # WebRTC端口
      - "4433:4433"
      - "5544:5544"
      # API端口
      - "8083:8083"
      - "8084:8084"
      # 其他端口
      - "1290:1290"
      # UDP端口范围（用于RTP）
      - "30000-30100:30000-30100/udp"
      - "6001:6001/udp"
      - "4888:4888/udp"
    volumes:
      # 持久化配置文件
      - easydarwin-configs:/app/configs
      # 持久化日志
      - easydarwin-logs:/app/logs
      # 持久化数据
      - easydarwin-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=warn
      # 生产环境配置
      - ENVIRONMENT=production
    networks:
      - easydarwin-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/getserverinfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 可选：Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: easydarwin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - easydarwin
    networks:
      - easydarwin-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # 可选：监控服务
  watchtower:
    image: containrrr/watchtower
    container_name: easydarwin-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_STOPPED=true
    command: easydarwin-prod
    networks:
      - easydarwin-network

networks:
  easydarwin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  easydarwin-configs:
    driver: local
  easydarwin-logs:
    driver: local
  easydarwin-data:
    driver: local
  nginx-logs:
    driver: local