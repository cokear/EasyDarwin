version: '3.8'

services:
  easydarwin:
    image: cakeor/easydarwin:latest
    container_name: easydarwin
    restart: always
    ports:
      # 只暴露必要端口，Web界面通过Nginx代理
      - "127.0.0.1:8080:8080"  # 只允许本地访问
      - "554:554"              # RTSP
      - "1935:1935"            # RTMP
      - "4433:4433"            # WebRTC信令
      - "5544:5544"            # WebRTC媒体
      - "30000-30100:30000-30100/udp"  # RTP
      - "6001:6001/udp"
      - "4888:4888/udp"
    volumes:
      - easydarwin-configs:/app/configs
      - easydarwin-logs:/app/logs
      - easydarwin-data:/app/data
      - easydarwin-records:/app/records
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=warn
      - ENVIRONMENT=production
    networks:
      - easydarwin-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/getserverinfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: easydarwin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
      - nginx-cache:/var/cache/nginx
    depends_on:
      - easydarwin
    networks:
      - easydarwin-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # 可选：监控服务
  watchtower:
    image: containrrr/watchtower
    container_name: easydarwin-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_NOTIFICATIONS=email
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${NOTIFICATION_EMAIL}
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=${NOTIFICATION_EMAIL}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=${SMTP_SERVER}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${SMTP_USER}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${SMTP_PASSWORD}
    command: easydarwin easydarwin-nginx
    networks:
      - easydarwin-network

  # 可选：日志收集
  logrotate:
    image: blacklabelops/logrotate
    container_name: easydarwin-logrotate
    restart: always
    volumes:
      - easydarwin-logs:/logs
      - nginx-logs:/nginx-logs
    environment:
      - LOGS_DIRECTORIES=/logs /nginx-logs
      - LOGROTATE_INTERVAL=daily
      - LOGROTATE_COPIES=7
      - LOGROTATE_SIZE=100M
    networks:
      - easydarwin-network

networks:
  easydarwin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  easydarwin-configs:
    driver: local
  easydarwin-logs:
    driver: local
  easydarwin-data:
    driver: local
  easydarwin-records:
    driver: local
  nginx-logs:
    driver: local
  nginx-cache:
    driver: local